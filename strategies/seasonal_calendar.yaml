# Seasonal calendar — single source of truth for every seasonal edge.
#
# This registry drives both the full-year calendar build
# (strategies/full_year_seasonal_calendar) and the coverage report
# (analysis/calendar_coverage.py). Edit HERE, not in the strategy scripts.
#
# status:   confirmed  -> survived a real OOS test, tradeable in the calendar
#           testing    -> a lead with evidence but not yet graduated (NOT traded)
#           rejected   -> killed by a guard (roll artifact / drift trap / etc.)
# forward:  pre-registered   -> frozen rule passed a genuine time-forward test
#           cross-instrument -> frozen rule passed on unseen sibling instruments
#           none             -> no clean OOS yet
# kind:     week  -> event_signal(week, hold_days)         [ISO-week anchored]
#           date  -> date_window_signal(start_md, end_md)  [calendar-date anchored]
#           cny   -> Chinese-New-Year-relative window       [moving feast]
# overlay:  true  -> eligible for the assembled calendar (fixed week/date legs)
#           false -> needs a custom signal (e.g. moving feast) — excluded for now
#
# Only `status: confirmed` AND `overlay: true` edges enter the traded calendar.

